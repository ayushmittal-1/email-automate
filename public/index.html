<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #1a1a1a;
    }

    /* Collapsible settings */
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px 8px 0 0;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      font-size: 15px;
    }

    .settings-toggle.collapsed {
      border-radius: 8px;
    }

    .settings-toggle .arrow {
      transition: transform 0.2s;
      font-size: 12px;
    }

    .settings-toggle.collapsed .arrow {
      transform: rotate(-90deg);
    }

    .settings-panel {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .settings-panel.hidden {
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    /* Upload section */
    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
      font-size: 14px;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #4a90d9;
      background: #f0f6ff;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .file-name {
      margin-top: 10px;
      font-size: 13px;
      color: #4a90d9;
      font-weight: 500;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #4a90d9;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #3a7bc8;
    }

    .btn-success {
      background: #34a853;
      color: #fff;
    }

    .btn-success:hover:not(:disabled) {
      background: #2d9249;
    }

    .btn-danger {
      background: #ea4335;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger:hover:not(:disabled) {
      background: #d33426;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Status message */
    .status {
      font-size: 14px;
      color: #555;
    }

    .status.error {
      color: #ea4335;
    }

    .status.success {
      color: #34a853;
    }

    /* Progress bar */
    .progress-container {
      margin-bottom: 20px;
      display: none;
    }

    .progress-label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-bar-fill.generate {
      background: #4a90d9;
    }

    .progress-bar-fill.send {
      background: #34a853;
    }

    /* Warning banner */
    .warning-banner {
      background: #fff8e1;
      border: 1px solid #ffcc02;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #856404;
      display: none;
    }

    /* Email preview cards */
    .email-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .email-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .email-card .to {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .email-card .subject {
      font-size: 13px;
      color: #4a90d9;
      margin-bottom: 8px;
    }

    .email-card .body {
      font-size: 13px;
      color: #555;
      white-space: pre-wrap;
      background: #fafafa;
      border-radius: 4px;
      padding: 12px;
      border: 1px solid #eee;
      max-height: 200px;
      overflow-y: auto;
    }

    .email-card .error-badge {
      font-size: 12px;
      color: #ea4335;
      font-weight: 500;
    }

    .email-card .send-status {
      font-size: 12px;
      font-weight: 500;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .send-status.sent {
      background: #e6f4ea;
      color: #34a853;
    }

    .send-status.failed {
      background: #fce8e6;
      color: #ea4335;
    }

    /* Summary */
    .summary {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .summary strong {
      color: #1a1a1a;
    }

    /* Filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      min-width: 180px;
      flex: 1;
    }

    .filter-group label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    .filter-group select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      cursor: pointer;
    }

    .filter-group select:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .filter-count {
      font-size: 13px;
      color: #555;
      margin-top: 8px;
    }

    .filter-count strong {
      color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Email Automation</h1>

    <!-- Warning banner for large CSVs -->
    <div class="warning-banner" id="warningBanner"></div>

    <!-- Settings Panel -->
    <div class="settings-toggle" onclick="toggleSettings()">
      <span>Settings</span>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="settings-panel" id="settingsPanel">
      <div class="form-grid">
        <div class="form-group">
          <label for="openaiKey">OpenAI API Key</label>
          <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off" data-1p-ignore data-lpignore="true">
        </div>
        <div class="form-group">
          <label for="subjectPrefix">Subject Prefix</label>
          <input type="text" id="subjectPrefix" placeholder="Optional prefix">
        </div>
        <div class="form-group">
          <label for="smtpHost">SMTP Host</label>
          <input type="text" id="smtpHost" placeholder="smtp.example.com">
        </div>
        <div class="form-group">
          <label for="smtpPort">SMTP Port</label>
          <input type="text" id="smtpPort" placeholder="587">
        </div>
        <div class="form-group">
          <label for="smtpUser">SMTP User</label>
          <input type="text" id="smtpUser" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="smtpPass">SMTP Password</label>
          <input type="password" id="smtpPass" placeholder="Password">
        </div>
        <div class="form-group">
          <label for="senderName">Sender Name</label>
          <input type="text" id="senderName" placeholder="Your Name">
        </div>
        <div class="form-group">
          <label for="senderEmail">Sender Email</label>
          <input type="text" id="senderEmail" placeholder="you@example.com">
        </div>
        <div class="form-group full-width">
          <label for="emailPrompt">Email Prompt</label>
          <textarea id="emailPrompt" rows="3" placeholder="Write a professional email to {Contact Person} at {Company} about {Film Title}..."></textarea>
        </div>
      </div>
    </div>

    <!-- CSV Upload -->
    <div class="section">
      <h2>Upload CSV</h2>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFile').click()">
        <div>Drag & drop a CSV file here, or click to browse</div>
        <div class="file-name" id="fileName"></div>
        <input type="file" id="csvFile" accept=".csv">
      </div>
    </div>

    <!-- Filters (shown after CSV upload) -->
    <div class="section" id="filterSection" style="display:none">
      <h2>Filter Contacts</h2>
      <div class="filters" id="filters"></div>
      <div class="filter-count" id="filterCount"></div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="actions">
        <button class="btn btn-primary" id="generateBtn" onclick="generatePreviews()" disabled>
          Generate Previews
        </button>
        <button class="btn btn-success" id="sendBtn" onclick="sendAll()" style="display:none">
          Send All
        </button>
        <span class="status" id="status"></span>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-container" id="progressContainer">
      <div class="progress-label">
        <span id="progressText">Processing...</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill generate" id="progressFill"></div>
      </div>
    </div>

    <!-- Previews -->
    <div id="previews"></div>
  </div>

  <script>
    let csvFile = null;
    let csvRows = [];
    let csvColumns = [];
    let activeFilters = {};
    let generatedEmails = [];
    let pollTimer = null;
    let activeJobId = null;
    let activeJobType = null;

    // ── Load config from server ──────────────────────────────────────────────

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        document.getElementById('smtpHost').value = config.smtpHost || '';
        document.getElementById('smtpPort').value = config.smtpPort || '587';
        document.getElementById('smtpUser').value = config.smtpUser || '';
        document.getElementById('senderName').value = config.senderName || '';
        document.getElementById('senderEmail').value = config.senderEmail || '';
        document.getElementById('subjectPrefix').value = config.subjectPrefix || '';
        document.getElementById('emailPrompt').value = config.emailPrompt || '';
      } catch (e) {}
    }

    loadConfig();
    restoreJobState();

    // ── Settings toggle ──────────────────────────────────────────────────────

    function toggleSettings() {
      const panel = document.getElementById('settingsPanel');
      const toggle = document.querySelector('.settings-toggle');
      panel.classList.toggle('hidden');
      toggle.classList.toggle('collapsed');
    }

    // ── Simple CSV parser ────────────────────────────────────────────────────

    function parseCSVClient(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return { columns: [], rows: [] };

      const columns = lines[0].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
        const row = {};
        columns.forEach((col, idx) => { row[col] = values[idx] || ''; });
        rows.push(row);
      }

      return { columns, rows };
    }

    // ── File upload ──────────────────────────────────────────────────────────

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('csvFile');

    function handleFile(file) {
      if (!file || !file.name.endsWith('.csv')) return;
      csvFile = file;
      document.getElementById('fileName').textContent = file.name;

      const reader = new FileReader();
      reader.onload = (e) => {
        const parsed = parseCSVClient(e.target.result);
        csvRows = parsed.rows;
        csvColumns = parsed.columns;
        activeFilters = {};
        buildFilters();
        document.getElementById('generateBtn').disabled = false;

        // Show warning for large CSVs
        const banner = document.getElementById('warningBanner');
        if (csvRows.length >= 500) {
          banner.textContent = `This CSV has ${csvRows.length} rows. Gmail limits sending to ~500 emails/day. Consider filtering or splitting your list.`;
          banner.style.display = 'block';
        } else {
          banner.style.display = 'none';
        }
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    // ── Filters ──────────────────────────────────────────────────────────────

    function buildFilters() {
      const section = document.getElementById('filterSection');
      const container = document.getElementById('filters');
      container.innerHTML = '';

      if (csvRows.length === 0) {
        section.style.display = 'none';
        return;
      }

      // Build a dropdown for each column (except Email which is unique per row)
      const filterColumns = csvColumns.filter(c => c !== 'Email');

      filterColumns.forEach(col => {
        const uniqueValues = [...new Set(csvRows.map(r => r[col]).filter(Boolean))].sort();
        if (uniqueValues.length <= 1) return; // no point filtering 1 value

        const group = document.createElement('div');
        group.className = 'filter-group';

        const label = document.createElement('label');
        label.textContent = col;
        group.appendChild(label);

        const select = document.createElement('select');
        select.id = 'filter-' + col;
        select.addEventListener('change', () => {
          if (select.value === '') {
            delete activeFilters[col];
          } else {
            activeFilters[col] = select.value;
          }
          updateFilterCount();
        });

        const allOption = document.createElement('option');
        allOption.value = '';
        allOption.textContent = `All (${uniqueValues.length})`;
        select.appendChild(allOption);

        uniqueValues.forEach(val => {
          const opt = document.createElement('option');
          opt.value = val;
          opt.textContent = val;
          select.appendChild(opt);
        });

        group.appendChild(select);
        container.appendChild(group);
      });

      section.style.display = 'block';
      updateFilterCount();
    }

    function getFilteredRows() {
      return csvRows.filter(row => {
        for (const [col, val] of Object.entries(activeFilters)) {
          if (row[col] !== val) return false;
        }
        return true;
      });
    }

    function updateFilterCount() {
      const filtered = getFilteredRows();
      const el = document.getElementById('filterCount');
      el.innerHTML = `<strong>${filtered.length}</strong> of ${csvRows.length} contacts selected`;
    }

    // ── Progress bar helpers ─────────────────────────────────────────────────

    function showProgress(type, text) {
      const container = document.getElementById('progressContainer');
      const fill = document.getElementById('progressFill');
      container.style.display = 'block';
      fill.className = 'progress-bar-fill ' + type;
      fill.style.width = '0%';
      document.getElementById('progressText').textContent = text;
      document.getElementById('progressPercent').textContent = '0%';
    }

    function updateProgress(processed, total) {
      const pct = total > 0 ? Math.round((processed / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPercent').textContent = pct + '%';
    }

    function hideProgress() {
      document.getElementById('progressContainer').style.display = 'none';
    }

    // ── Polling ──────────────────────────────────────────────────────────────

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      activeJobId = null;
      activeJobType = null;
    }

    function startPolling(jobId, type, onResults, onComplete) {
      stopPolling();
      activeJobId = jobId;
      activeJobType = type;
      let receivedCount = 0;

      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/jobs/${jobId}?since=${receivedCount}`);
          if (!res.ok) {
            stopPolling();
            hideProgress();
            const status = document.getElementById('status');
            if (res.status === 404) {
              status.textContent = 'Server restarted, please re-generate';
            } else {
              status.textContent = 'Polling error';
            }
            status.className = 'status error';
            resetButtons();
            return;
          }

          const data = await res.json();

          if (data.results.length > 0) {
            onResults(data.results, receivedCount);
            receivedCount += data.results.length;
          }

          updateProgress(data.processed, data.total);
          document.getElementById('progressText').textContent =
            `${type === 'generate' ? 'Generating' : 'Sending'} ${data.processed}/${data.total}...`;

          if (data.status === 'completed' || data.status === 'failed') {
            stopPolling();
            hideProgress();
            onComplete(data);
          }
        } catch (err) {
          // Network blip — silently retry on next interval
        }
      }, 1000);
    }

    function resetButtons() {
      const btn = document.getElementById('generateBtn');
      btn.disabled = csvRows.length === 0;
      btn.textContent = 'Generate Previews';
    }

    // ── Generate previews ────────────────────────────────────────────────────

    async function generatePreviews() {
      if (csvRows.length === 0) return;

      const filtered = getFilteredRows();
      if (filtered.length === 0) {
        document.getElementById('status').textContent = 'No contacts match the current filters';
        document.getElementById('status').className = 'status error';
        return;
      }

      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const sendBtn = document.getElementById('sendBtn');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Generating...';
      sendBtn.style.display = 'none';
      status.textContent = '';
      status.className = 'status';
      document.getElementById('previews').innerHTML = '';
      generatedEmails = [];

      showProgress('generate', `Generating 0/${filtered.length}...`);

      try {
        const res = await fetch('/api/jobs/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            rows: filtered,
            openaiKey: document.getElementById('openaiKey').value,
            emailPrompt: document.getElementById('emailPrompt').value,
            subjectPrefix: document.getElementById('subjectPrefix').value,
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || 'Generation failed';
          status.className = 'status error';
          btn.disabled = false;
          btn.textContent = 'Generate Previews';
          hideProgress();
          return;
        }

        startPolling(data.jobId, 'generate',
          // onResults — render cards incrementally
          (newResults, startIdx) => {
            newResults.forEach((email, i) => {
              const idx = startIdx + i;
              generatedEmails[idx] = email;
              appendEmailCard(email, idx);
            });
            updateSendButton();
          },
          // onComplete
          (jobData) => {
            const successCount = generatedEmails.filter(e => !e.error).length;
            status.textContent = `Generated ${successCount}/${generatedEmails.length} emails`;
            status.className = 'status success';
            btn.disabled = false;
            btn.textContent = 'Generate Previews';
            updateSendButton();
          }
        );
      } catch (err) {
        status.textContent = 'Network error: ' + err.message;
        status.className = 'status error';
        btn.disabled = false;
        btn.textContent = 'Generate Previews';
        hideProgress();
      }
    }

    // ── Render email cards ───────────────────────────────────────────────────

    function appendEmailCard(email, idx) {
      const container = document.getElementById('previews');
      const card = document.createElement('div');
      card.className = 'email-card';
      card.id = 'card-' + idx;

      if (email.error) {
        card.innerHTML = `
          <div class="email-card-header">
            <div>
              <div class="to">${esc(email.contactName)} &lt;${esc(email.to)}&gt;</div>
              <div class="error-badge">Error: ${esc(email.error)}</div>
            </div>
          </div>
        `;
      } else {
        card.innerHTML = `
          <div class="email-card-header">
            <div>
              <div class="to">${esc(email.contactName)} &lt;${esc(email.to)}&gt;</div>
              <div class="subject">${esc(email.subject)}</div>
            </div>
            <button class="btn btn-danger" onclick="removeEmail(${idx})">Remove</button>
          </div>
          <div class="body">${esc(email.body)}</div>
        `;
      }

      container.appendChild(card);
    }

    function renderAllPreviews() {
      const container = document.getElementById('previews');
      container.innerHTML = '';
      generatedEmails.forEach((email, idx) => {
        if (!email || email._removed) return;
        appendEmailCard(email, idx);
      });
      updateSendButton();
    }

    function removeEmail(idx) {
      generatedEmails[idx]._removed = true;
      document.getElementById('card-' + idx).remove();
      updateSendButton();
    }

    function updateSendButton() {
      // Don't show send button while generation is still running
      if (activeJobType === 'generate') return;

      const remaining = generatedEmails.filter(e => e && !e.error && !e._removed && !e._sent);
      const sendBtn = document.getElementById('sendBtn');
      if (remaining.length > 0) {
        sendBtn.style.display = 'inline-flex';
        sendBtn.textContent = `Send All (${remaining.length})`;
      } else {
        sendBtn.style.display = 'none';
      }
    }

    // ── Send all emails ──────────────────────────────────────────────────────

    async function sendAll() {
      const btn = document.getElementById('sendBtn');
      const status = document.getElementById('status');

      const emailsToSend = generatedEmails.filter(e => e && !e.error && !e._removed && !e._sent);
      if (emailsToSend.length === 0) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';
      status.textContent = '';
      status.className = 'status';

      showProgress('send', `Sending 0/${emailsToSend.length}...`);

      const payload = {
        emails: emailsToSend.map(e => ({
          to: e.to,
          subject: e.subject,
          body: e.body,
        })),
        smtp: {
          host: document.getElementById('smtpHost').value,
          port: parseInt(document.getElementById('smtpPort').value) || 587,
          user: document.getElementById('smtpUser').value,
          pass: document.getElementById('smtpPass').value,
        },
        sender: {
          name: document.getElementById('senderName').value,
          email: document.getElementById('senderEmail').value,
        },
      };

      try {
        const res = await fetch('/api/jobs/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || 'Send failed';
          status.className = 'status error';
          btn.disabled = false;
          btn.textContent = `Send All (${emailsToSend.length})`;
          hideProgress();
          return;
        }

        startPolling(data.jobId, 'send',
          // onResults — update card badges incrementally
          (newResults) => {
            newResults.forEach(result => {
              applySendResult(result);
            });
          },
          // onComplete
          (jobData) => {
            const allResults = getAllSendResults(jobData);
            const sentCount = allResults.filter(r => r.success).length;
            const failCount = allResults.filter(r => !r.success).length;
            status.textContent = `Sent ${sentCount}/${allResults.length}` + (failCount > 0 ? ` (${failCount} failed)` : '');
            status.className = failCount > 0 ? 'status error' : 'status success';

            const remaining = generatedEmails.filter(e => e && !e.error && !e._removed && !e._sent);
            if (remaining.length > 0) {
              btn.disabled = false;
              btn.textContent = `Send All (${remaining.length})`;
            } else {
              btn.style.display = 'none';
            }
          }
        );
      } catch (err) {
        status.textContent = 'Network error: ' + err.message;
        status.className = 'status error';
        btn.disabled = false;
        btn.textContent = `Send All (${emailsToSend.length})`;
        hideProgress();
      }
    }

    function applySendResult(result) {
      // Find the card for this email address
      for (let idx = 0; idx < generatedEmails.length; idx++) {
        const email = generatedEmails[idx];
        if (!email || email._removed || email.error || email._sent) continue;
        if (email.to === result.to) {
          const card = document.getElementById('card-' + idx);
          if (!card) continue;

          const removeBtn = card.querySelector('.btn-danger');
          if (removeBtn) removeBtn.remove();

          const existing = card.querySelector('.send-status');
          if (existing) existing.remove();

          const badge = document.createElement('div');
          if (result.success) {
            badge.className = 'send-status sent';
            badge.textContent = 'Sent';
            email._sent = true;
          } else {
            badge.className = 'send-status failed';
            badge.textContent = 'Failed: ' + (result.error || 'Unknown error');
          }
          card.appendChild(badge);
          break;
        }
      }
    }

    function getAllSendResults(jobData) {
      // jobData.results only has the incremental tail; reconstruct from generatedEmails
      const results = [];
      generatedEmails.forEach(email => {
        if (!email || email._removed || email.error) return;
        if (email._sent) {
          results.push({ to: email.to, success: true });
        }
      });
      // Also include failures from the last batch
      if (jobData.results) {
        jobData.results.forEach(r => {
          if (!r.success) results.push(r);
        });
      }
      return results;
    }

    // ── Restore job state on page refresh ────────────────────────────────────

    async function restoreJobState() {
      try {
        const res = await fetch('/api/jobs/current');
        if (!res.ok) return;
        const data = await res.json();

        // Restore generate job
        if (data.generate) {
          const gen = data.generate;
          generatedEmails = gen.results || [];
          renderAllPreviews();

          if (gen.status === 'running') {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Generating...';
            showProgress('generate', `Generating ${gen.processed}/${gen.total}...`);
            updateProgress(gen.processed, gen.total);

            startPolling(gen.id, 'generate',
              (newResults, startIdx) => {
                newResults.forEach((email, i) => {
                  const idx = startIdx + i;
                  generatedEmails[idx] = email;
                  appendEmailCard(email, idx);
                });
                updateSendButton();
              },
              (jobData) => {
                const successCount = generatedEmails.filter(e => !e.error).length;
                document.getElementById('status').textContent = `Generated ${successCount}/${generatedEmails.length} emails`;
                document.getElementById('status').className = 'status success';
                btn.disabled = false;
                btn.textContent = 'Generate Previews';
                updateSendButton();
              }
            );
          } else {
            // Completed generate job — just show summary
            const successCount = generatedEmails.filter(e => !e.error).length;
            document.getElementById('status').textContent = `Generated ${successCount}/${generatedEmails.length} emails`;
            document.getElementById('status').className = 'status success';
            updateSendButton();
          }
        }

        // Restore send job
        if (data.send && data.generate) {
          const snd = data.send;
          // Apply already-processed send results
          if (snd.results) {
            snd.results.forEach(result => applySendResult(result));
          }

          if (snd.status === 'running') {
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending...';
            showProgress('send', `Sending ${snd.processed}/${snd.total}...`);
            updateProgress(snd.processed, snd.total);

            startPolling(snd.id, 'send',
              (newResults) => {
                newResults.forEach(result => applySendResult(result));
              },
              (jobData) => {
                hideProgress();
                const allResults = getAllSendResults(jobData);
                const sentCount = allResults.filter(r => r.success).length;
                const failCount = allResults.filter(r => !r.success).length;
                const status = document.getElementById('status');
                status.textContent = `Sent ${sentCount}/${allResults.length}` + (failCount > 0 ? ` (${failCount} failed)` : '');
                status.className = failCount > 0 ? 'status error' : 'status success';

                const remaining = generatedEmails.filter(e => e && !e.error && !e._removed && !e._sent);
                if (remaining.length > 0) {
                  btn.disabled = false;
                  btn.textContent = `Send All (${remaining.length})`;
                } else {
                  btn.style.display = 'none';
                }
              }
            );
          } else if (snd.status === 'completed') {
            const allResults = getAllSendResults(snd);
            const sentCount = allResults.filter(r => r.success).length;
            const failCount = allResults.filter(r => !r.success).length;
            const status = document.getElementById('status');
            status.textContent = `Sent ${sentCount}/${allResults.length}` + (failCount > 0 ? ` (${failCount} failed)` : '');
            status.className = failCount > 0 ? 'status error' : 'status success';
            updateSendButton();
          }
        }
      } catch (e) {
        // Server not reachable or no jobs — that's fine
      }
    }

    // ── Escape HTML ──────────────────────────────────────────────────────────

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
  </script>
</body>
